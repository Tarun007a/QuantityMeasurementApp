spring:
  application:
    name: quantity-service

  boot:
    admin:
      client:
        url: http://localhost:9090

  datasource:
    url: jdbc:mysql://localhost:3306/qma_quantity_service_db
    username: root
    password: ${db_password}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true