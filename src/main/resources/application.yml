spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

  jpa:
    hibernate:
      ddl-auto: update

security:
  jwt:
    secret: ${JWT_SECURITY_KEY}

server:
  port:
    ${PORT:8080}
